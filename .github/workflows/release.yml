name: Release artifacts

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  build:
    name: reproducible build
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements/runtime-py311.lock
            requirements/release-py311.lock

      - name: Install pinned release toolchain
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install --require-hashes -r requirements/release-py311.lock

      - name: Derive release identity
        shell: bash
        run: |
          set -euo pipefail
          version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          epoch=$(git show -s --format=%ct HEAD)
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=$epoch" >> "$GITHUB_ENV"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "$GITHUB_REF_NAME" = "v$version"
          fi

      - name: Materialize two clean source trees
        shell: bash
        run: |
          set -euo pipefail
          mkdir source-a source-b
          git archive --format=tar HEAD | tar -xf - -C source-a
          git archive --format=tar HEAD | tar -xf - -C source-b

      - name: Build twice with the pinned backend
        shell: bash
        run: |
          set -euo pipefail
          python -m build --no-isolation --outdir "$PWD/dist-a" source-a
          python -m build --no-isolation --outdir "$PWD/dist-b" source-b
          python scripts/release_artifacts.py normalize-sdist \
            "dist-a/qstriage-${PACKAGE_VERSION}.tar.gz" \
            --epoch "$SOURCE_DATE_EPOCH"
          python scripts/release_artifacts.py normalize-sdist \
            "dist-b/qstriage-${PACKAGE_VERSION}.tar.gz" \
            --epoch "$SOURCE_DATE_EPOCH"

      - name: Smoke-test wheels and generate reproducible CycloneDX SBOMs
        shell: bash
        run: |
          set -euo pipefail
          for suffix in a b; do
            environment="release-smoke-$suffix"
            directory="dist-$suffix"
            python -m venv "$environment"
            "$environment/bin/python" -m pip install "pip==26.1.2"
            "$environment/bin/python" -m pip install \
              --require-hashes \
              -r requirements/runtime-py311.lock
            "$environment/bin/python" -m pip install \
              --no-deps \
              "$directory"/*.whl
            "$environment/bin/python" -m pip check
            "$environment/bin/python" -m qstriage.cli version
            cyclonedx-py environment "$environment/bin/python" \
              --pyproject pyproject.toml \
              --mc-type application \
              --spec-version 1.6 \
              --output-reproducible \
              --output-format JSON \
              --output-file "$directory/qstriage-${PACKAGE_VERSION}.cdx.json"
            python scripts/release_artifacts.py checksums "$directory" \
              --output "$directory/SHA256SUMS"
            python scripts/release_artifacts.py verify-checksums \
              "$directory/SHA256SUMS"
          done

      - name: Prove byte-for-byte reproducibility
        run: python scripts/release_artifacts.py compare dist-a dist-b

      - name: Validate package metadata
        shell: bash
        run: |
          set -euo pipefail
          python -m twine check dist-a/*.whl dist-a/*.tar.gz

      - name: Stage release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          cp dist-a/* release/

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qstriage-release-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  attest:
    name: attest release artifacts
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qstriage-release-${{ github.sha }}
          path: release

      - name: Verify downloaded checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd release && sha256sum --check SHA256SUMS)

      - name: Locate CycloneDX SBOM
        id: sbom
        shell: bash
        run: |
          set -euo pipefail
          sbom=$(find release -maxdepth 1 -type f -name '*.cdx.json' -print -quit)
          test -n "$sbom"
          echo "path=$sbom" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release/SHA256SUMS

      - name: Attest package SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/*.whl
            release/*.tar.gz
          sbom-path: ${{ steps.sbom.outputs.path }}
