name: Release artifacts

on:
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing exact release tag to rebuild and attest (for example v1.2.0)
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: false

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  source:
    name: verify source identity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      artifact_name: ${{ steps.identity.outputs.artifact_name }}
      package_version: ${{ steps.identity.outputs.package_version }}
      source_epoch: ${{ steps.identity.outputs.source_epoch }}
      source_sha: ${{ steps.identity.outputs.source_sha }}

    steps:
      - name: Check out requested source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          fetch-tags: true
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Verify source and package identity
        id: identity
        env:
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          source_sha=$(git rev-parse HEAD)
          source_epoch=$(git show -s --format=%ct HEAD)

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            requested_tag="$REQUESTED_RELEASE_TAG"
            if [[ ! "$requested_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: release_tag must be an exact vMAJOR.MINOR.PATCH tag"
              exit 1
            fi
            tag_sha=$(git rev-parse "refs/tags/$requested_tag^{commit}")
            test "$tag_sha" = "$source_sha"
            test "$requested_tag" = "v$version"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag_sha=$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{commit}")
            test "$tag_sha" = "$source_sha"
            test "$GITHUB_REF_NAME" = "v$version"
          fi

          echo "artifact_name=qstriage-release-$source_sha" >> "$GITHUB_OUTPUT"
          echo "package_version=$version" >> "$GITHUB_OUTPUT"
          echo "source_epoch=$source_epoch" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

  release-lock:
    needs: source
    name: verify Linux release lock
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PIP_INDEX_URL: https://pypi.org/simple
      PIP_EXTRA_INDEX_URL: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.source.outputs.source_sha }}

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Compile Linux release lock candidate
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install \
            --index-url https://pypi.org/simple \
            "pip==26.1.2" \
            "pip-tools==7.5.3"
          mkdir generated
          CUSTOM_COMPILE_COMMAND="python -m piptools compile requirements/release.in --index-url https://pypi.org/simple --generate-hashes --allow-unsafe --output-file requirements/release-linux-py311.lock" \
          python -m piptools compile \
            requirements/release.in \
            --index-url https://pypi.org/simple \
            --generate-hashes \
            --allow-unsafe \
            --output-file generated/release-linux-py311.lock \
            --quiet
          if grep -En \
            'https?://[^/[:space:]]+@|--trusted-host|packages\.applied|reader:' \
            generated/release-linux-py311.lock
          then
            echo "ERROR: private index or credential material found"
            exit 1
          fi

      - name: Compare committed and generated Linux locks
        id: compare_lock
        shell: bash
        run: |
          set -euo pipefail
          if cmp -s \
            requirements/release-linux-py311.lock \
            generated/release-linux-py311.lock
          then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Linux lock candidate
        if: steps.compare_lock.outputs.match != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-py311-lock-${{ needs.source.outputs.source_sha }}
          path: generated/release-linux-py311.lock
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Enforce committed Linux release lock
        if: steps.compare_lock.outputs.match != 'true'
        shell: bash
        run: |
          diff -u \
            requirements/release-linux-py311.lock \
            generated/release-linux-py311.lock || true
          echo "ERROR: committed Linux release lock is stale or was generated on another platform"
          exit 1

  build:
    needs:
      - source
      - release-lock
    name: reproducible build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PACKAGE_VERSION: ${{ needs.source.outputs.package_version }}
      SOURCE_DATE_EPOCH: ${{ needs.source.outputs.source_epoch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.source.outputs.source_sha }}

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements/runtime-py311.lock
            requirements/release-linux-py311.lock

      - name: Install pinned release toolchain
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install --require-hashes -r requirements/release-linux-py311.lock

      - name: Materialize two clean source trees
        shell: bash
        run: |
          set -euo pipefail
          mkdir source-a source-b
          git archive --format=tar HEAD | tar -xf - -C source-a
          git archive --format=tar HEAD | tar -xf - -C source-b

      - name: Build twice with the pinned backend
        shell: bash
        run: |
          set -euo pipefail
          python -m build --no-isolation --outdir "$PWD/dist-a" source-a
          python -m build --no-isolation --outdir "$PWD/dist-b" source-b
          python scripts/release_artifacts.py normalize-sdist \
            "dist-a/qstriage-${PACKAGE_VERSION}.tar.gz" \
            --epoch "$SOURCE_DATE_EPOCH"
          python scripts/release_artifacts.py normalize-sdist \
            "dist-b/qstriage-${PACKAGE_VERSION}.tar.gz" \
            --epoch "$SOURCE_DATE_EPOCH"

      - name: Smoke-test wheels and generate reproducible CycloneDX SBOMs
        shell: bash
        run: |
          set -euo pipefail
          for suffix in a b; do
            environment="release-smoke-$suffix"
            directory="dist-$suffix"
            python -m venv "$environment"
            "$environment/bin/python" -m pip install "pip==26.1.2"
            "$environment/bin/python" -m pip install \
              --require-hashes \
              -r requirements/runtime-py311.lock
            "$environment/bin/python" -m pip install \
              --no-deps \
              "$directory"/*.whl
            "$environment/bin/python" -m pip check
            "$environment/bin/python" -m qstriage.cli version
            cyclonedx-py environment "$environment/bin/python" \
              --pyproject pyproject.toml \
              --mc-type application \
              --spec-version 1.6 \
              --output-reproducible \
              --output-format JSON \
              --output-file "$directory/qstriage-${PACKAGE_VERSION}.cdx.json"
            python scripts/release_artifacts.py checksums "$directory" \
              --output "$directory/SHA256SUMS"
            python scripts/release_artifacts.py verify-checksums \
              "$directory/SHA256SUMS"
          done

      - name: Prove byte-for-byte reproducibility
        run: python scripts/release_artifacts.py compare dist-a dist-b

      - name: Validate package metadata
        shell: bash
        run: |
          set -euo pipefail
          python -m twine check dist-a/*.whl dist-a/*.tar.gz

      - name: Stage release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          cp dist-a/* release/

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.source.outputs.artifact_name }}
          path: release/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  attest:
    name: attest release artifacts
    if: >-
      github.event.repository.private == false &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - source
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.source.outputs.artifact_name }}
          path: release

      - name: Verify downloaded checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd release && sha256sum --check SHA256SUMS)

      - name: Locate CycloneDX SBOM
        id: sbom
        shell: bash
        run: |
          set -euo pipefail
          sbom=$(find release -maxdepth 1 -type f -name '*.cdx.json' -print -quit)
          test -n "$sbom"
          echo "path=$sbom" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release/SHA256SUMS

      - name: Attest package SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/*.whl
            release/*.tar.gz
          sbom-path: ${{ steps.sbom.outputs.path }}
