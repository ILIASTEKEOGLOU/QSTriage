name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  test:
    name: test (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements/py311.lock"

      - name: Install pinned pip
        run: python -m pip install "pip==26.1.2"

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements/py311.lock

      - name: Install project without dependency resolution
        run: python -m pip install --no-deps -e .

      - name: Check dependency consistency
        run: python -m pip check

      - name: Smoke test CLI
        run: python -m qstriage.cli version

      - name: Run tests
        run: python -m pytest
